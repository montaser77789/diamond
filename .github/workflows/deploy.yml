name: Deploy Diamond

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy To VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: 185.158.107.240
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22

          timeout: 120s
          command_timeout: 30m
          script_stop: true

          script: |
            cd /var/www/diamond

            git fetch origin
            git reset --hard origin/main

            npm install

            sudo chown -R deploy:deploy /var/www/diamond || true

            find .next -type d -exec chmod 755 {} \; 2>/dev/null || true
            find .next -type f -exec chmod 644 {} \; 2>/dev/null || true

            rm -rf .next

            npm run build

            pm2 restart diamond
            pm2 save