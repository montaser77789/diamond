name: Deploy Diamond

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check Secrets
        run: |
          echo "HOST=${{ secrets.SERVER_HOST }}"
          echo "USER=${{ secrets.SERVER_USER }}"
          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "SSH_KEY_EXISTS=yes"
          else
            echo "SSH_KEY_EXISTS=no"
          fi

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          debug: true
          script: |
            pwd
            whoami